<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visionary Mission Control</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-container">
    <header class="top-bar">
      <span class="logo">Visionary</span>
      <nav class="nav-tabs">
        <a class="nav-tab active" href="#/board" data-tab="board">Board</a>
        <a class="nav-tab" href="#/agents" data-tab="agents">Agents</a>
        <a class="nav-tab" href="#/activity" data-tab="activity">Activity</a>
        <a class="nav-tab" href="#/inbox" data-tab="inbox">Inbox</a>
        <a class="nav-tab" href="#/crons" data-tab="crons">Crons</a>
        <a class="nav-tab" href="#/briefs" data-tab="briefs">Briefs</a>
        <a class="nav-tab" href="#/audits" data-tab="audits">Audits</a>
        <a class="nav-tab" href="#/portfolio" data-tab="portfolio">Portfolio</a>
        <a class="nav-tab" href="#/memory" data-tab="memory">Memory</a>
        <a class="nav-tab" href="#/projects" data-tab="projects">Projects</a>
      </nav>
      <div class="top-bar-actions">
        <span id="sse-status" class="badge badge-green">LIVE</span>
      </div>
    </header>
    <main id="main-content" class="main-content"></main>
    <footer class="status-bar">
      <span id="status-left">Ready</span>
      <div class="status-bar-center">
        <span class="status-metric">Agents: <span class="status-metric-value" id="status-agents">0</span></span>
        <span class="status-metric">Tasks: <span class="status-metric-value" id="status-tasks">0</span></span>
        <span class="status-metric">Last event: <span class="status-metric-value" id="status-last-event">--</span></span>
      </div>
      <span id="status-right"></span>
    </footer>
  </div>
  <script src="/app.js" defer></script>
</body>
</html>
