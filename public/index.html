<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visionary</title>
  <meta name="theme-color" content="#1e1e20">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-512.svg">
  <link rel="stylesheet" href="/styles.css">
  <script>
    // Electron shell: pad the titlebar for the macOS traffic lights.
    if (/Electron/i.test(navigator.userAgent)) document.documentElement.className += ' electron';
  </script>
</head>
<body>
  <script>if (/Electron/i.test(navigator.userAgent)) document.body.classList.add('electron');</script>
  <div class="app-container">
    <header class="top-bar">
      <span class="logo">Visionary</span>
      <div class="top-bar-actions">
        <a id="export-data-link" href="/api/export" class="nav-action-link" title="Download full data backup">Export</a>
        <span id="sse-status" class="badge badge-green">Live</span>
      </div>
    </header>
    <div class="content-with-chat">
      <aside class="sidebar">
        <nav class="sidebar-nav">
          <a class="nav-tab active" href="#/overview" data-tab="overview">
            <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3a7 7 0 0 1 7 7c0 1.9-.76 3.64-2 4.9M10 3a7 7 0 0 0-7 7c0 1.9.76 3.64 2 4.9M10 3v2"/><path d="m10 10 3.5-2.5"/><circle cx="10" cy="10" r="1.2" fill="currentColor"/></svg></span>
            Overview
          </a>
          <a class="nav-tab" href="#/board" data-tab="board">
            <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="4" width="4" height="12" rx="1"/><rect x="8" y="4" width="4" height="8" rx="1"/><rect x="13" y="4" width="4" height="10" rx="1"/></svg></span>
            Board
          </a>
          <a class="nav-tab" href="#/agents" data-tab="agents">
            <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="2.6"/><path d="M2.5 16c.7-2.6 2.4-4 4.5-4s3.8 1.4 4.5 4"/><circle cx="14" cy="8" r="2.1"/><path d="M12.8 12.3c1.9.2 3.4 1.4 4 3.7"/></svg></span>
            Agents
          </a>
          <a class="nav-tab" href="#/activity" data-tab="activity">
            <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 10h3l2-5 4 10 2-5h4"/></svg></span>
            Activity
          </a>
          <a class="nav-tab" href="#/inbox" data-tab="inbox">
            <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2.5"/><path d="M3 11.5 5 5a1.5 1.5 0 0 1 1.4-1h7.2A1.5 1.5 0 0 1 15 5l2 6.5"/><path d="M3 11.5h4l1 2h4l1-2h4"/></svg></span>
            Inbox
          </a>
          <div class="nav-section-label">Intelligence</div>
          <a class="nav-tab" href="#/briefs" data-tab="briefs">
            <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h7l3 3v11a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z"/><path d="M12 3v3h3M7 10h6M7 13h6"/></svg></span>
            Briefs
          </a>
          <a class="nav-tab" href="#/audits" data-tab="audits">
            <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2.5 16 5v4.5c0 4-2.5 6.7-6 8-3.5-1.3-6-4-6-8V5l6-2.5Z"/><path d="m7.5 10 1.8 1.8L13 8"/></svg></span>
            Audits
          </a>
          <a class="nav-tab" href="#/portfolio" data-tab="portfolio">
            <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 16h14M3 16V4"/><path d="m5 12 3.2-3.5 2.8 2 4-4.5"/></svg></span>
            Portfolio
          </a>
          <a class="nav-tab" href="#/memory" data-tab="memory">
            <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3.5" width="14" height="4.5" rx="1"/><rect x="3" y="12" width="14" height="4.5" rx="1"/><path d="M6 5.75h.01M6 14.25h.01"/></svg></span>
            Memory
          </a>
          <div class="nav-section-label">Manage</div>
          <a class="nav-tab" href="#/projects" data-tab="projects">
            <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6a1.5 1.5 0 0 1 1.5-1.5H8l2 2h5.5A1.5 1.5 0 0 1 17 8v6.5a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 3 14.5V6Z"/></svg></span>
            Projects
          </a>
          <a class="nav-tab" href="#/crons" data-tab="crons">
            <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><path d="M10 6v4l2.8 1.8"/></svg></span>
            Crons
          </a>
          <a class="nav-tab" href="#/settings" data-tab="settings">
            <span class="nav-icon"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="2.5"/><path d="M10 2.8 11 5a5.2 5.2 0 0 1 1.8.74l2.3-.8 1.4 2.45-1.8 1.62a5.4 5.4 0 0 1 0 1.98l1.8 1.62-1.4 2.45-2.3-.8a5.2 5.2 0 0 1-1.8.74L10 17.2 9 15a5.2 5.2 0 0 1-1.8-.74l-2.3.8-1.4-2.45 1.8-1.62a5.4 5.4 0 0 1 0-1.98L3.5 7.39l1.4-2.45 2.3.8A5.2 5.2 0 0 1 9 5l1-2.2Z"/></svg></span>
            Settings
          </a>
        </nav>
        <div id="app-sidebar" class="app-sidebar"></div>
      </aside>
      <main id="main-content" class="main-content"></main>
      <aside id="chat-panel" class="chat-panel">
        <div class="chat-header">
          <span class="chat-title">Argus</span>
          <select id="chat-session-select" class="chat-session-select" title="Chat sessions"></select>
          <button class="chat-new" id="chat-new" title="New chat">＋</button>
          <button class="chat-toggle" id="chat-toggle" title="Hide chat">›</button>
        </div>
        <div class="chat-voice-strip" id="chat-voice-strip">
          <span class="chat-voice-state" id="chat-voice-state">Voice idle</span>
          <span class="chat-voice-detail" id="chat-voice-detail">Push to talk</span>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-bar">
          <button class="chat-voice-btn" id="chat-voice-btn" title="Talk to Argus">🎙</button>
          <input type="text" id="chat-input" class="chat-input" placeholder="Message Argus" autocomplete="off">
          <button class="chat-send" id="chat-send" title="Send">↑</button>
        </div>
      </aside>
      <button id="chat-reopen" class="chat-reopen-btn" title="Open Argus chat">💬</button>
    </div>
    <footer class="status-bar">
      <span id="status-left">Ready</span>
      <div class="status-bar-center">
        <span class="status-metric">Agents <span class="status-metric-value" id="status-agents">0</span></span>
        <span class="status-metric">Tasks <span class="status-metric-value" id="status-tasks">0</span></span>
        <span class="status-metric">Last event <span class="status-metric-value" id="status-last-event">--</span></span>
      </div>
      <span id="status-right"></span>
    </footer>
  </div>
  <script src="/app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
</html>
