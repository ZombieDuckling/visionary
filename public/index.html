<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visionary Mission Control</title>
  <meta name="theme-color" content="#F4ECFF">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-512.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-container">
    <header class="top-bar">
      <span class="logo">Visionary</span>
      <nav class="nav-tabs">
        <a class="nav-tab active" href="#/overview" data-tab="overview">Overview</a>
        <a class="nav-tab" href="#/board" data-tab="board">Board</a>
        <a class="nav-tab" href="#/agents" data-tab="agents">Agents</a>
        <a class="nav-tab" href="#/activity" data-tab="activity">Activity</a>
        <a class="nav-tab" href="#/inbox" data-tab="inbox">Inbox</a>
        <a class="nav-tab" href="#/crons" data-tab="crons">Crons</a>
        <a class="nav-tab" href="#/briefs" data-tab="briefs">Briefs</a>
        <a class="nav-tab" href="#/audits" data-tab="audits">Audits</a>
        <a class="nav-tab" href="#/portfolio" data-tab="portfolio">Portfolio</a>
        <a class="nav-tab" href="#/memory" data-tab="memory">Memory</a>
        <a class="nav-tab" href="#/projects" data-tab="projects">Projects</a>
        <a class="nav-tab" href="#/settings" data-tab="settings">Settings</a>
      </nav>
      <div class="top-bar-actions">
        <a id="export-data-link" href="/api/export" class="nav-action-link" title="Download full data backup">Export Data</a>
        <span id="sse-status" class="badge badge-green">LIVE</span>
      </div>
    </header>
    <div class="content-with-chat">
      <main id="main-content" class="main-content"></main>
      <aside id="chat-panel" class="chat-panel">
        <div class="chat-header">
          <span class="chat-title">⚙️ Jarvis</span>
          <button class="chat-toggle" id="chat-toggle" title="Toggle chat">◀</button>
        </div>
        <div class="chat-voice-strip" id="chat-voice-strip">
          <span class="chat-voice-state" id="chat-voice-state">Voice idle</span>
          <span class="chat-voice-detail" id="chat-voice-detail">Push to talk</span>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-bar">
          <button class="chat-voice-btn" id="chat-voice-btn" title="Talk to Jarvis">🎙</button>
          <input type="text" id="chat-input" class="chat-input" placeholder="Talk to Jarvis..." autocomplete="off">
          <button class="chat-send" id="chat-send">▶</button>
        </div>
      </aside>
      <button id="chat-reopen" class="chat-reopen-btn" title="Open Jarvis chat">⚙️</button>
    </div>
    <footer class="status-bar">
      <span id="status-left">Ready</span>
      <div class="status-bar-center">
        <span class="status-metric">Agents: <span class="status-metric-value" id="status-agents">0</span></span>
        <span class="status-metric">Tasks: <span class="status-metric-value" id="status-tasks">0</span></span>
        <span class="status-metric">Last event: <span class="status-metric-value" id="status-last-event">--</span></span>
      </div>
      <span id="status-right"></span>
    </footer>
  </div>
  <script src="/app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
</html>
